{% set name = "sphinx-sitemap" %}
{% set version = "2.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sphinx-sitemap/sphinx_sitemap-2.9.0.tar.gz
  sha256: 70f97bcdf444e3d68e118355cf82a1f54c4d3c03d651cd17fe87398b26e25e21

build:
  number: 0
  skip: true  # [py<37]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - python
    - six
    - sphinx >=1.2
    - sphinx-last-updated-by-git

test:
  imports:
    - sphinx_sitemap
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/jdillard/sphinx-sitemap
  dev_url: https://github.com/jdillard/sphinx-sitemap
  doc_url: https://sphinx-sitemap.readthedocs.io/
  summary: Sitemap generator for Sphinx
  description: |
    A Sphinx extension to generate multi-version and multi-language sitemaps.org compliant sitemaps
    for the HTML version of your Sphinx documentation.
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bollwyvl
